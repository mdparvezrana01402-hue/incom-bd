<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Viral Videos</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- অ্যাডমিন প্যানেল থেকে সেট করা কাস্টম অ্যাড স্ক্রিপ্ট (যেমন: Adobe/Monetag Script) এখানে লোড হবে -->
    <div id="dynamicAdScripts"></div>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #0b0c10; color: #ffffff; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .phone-container { width: 100%; max-width: 420px; height: 100vh; background-color: #121212; display: flex; flex-direction: column; position: relative; box-shadow: 0 0 20px rgba(0,0,0,0.8); overflow: hidden; }
        .header { padding: 15px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #1f1f1f; background-color: #16161a; }
        .header-title { display: flex; align-items: center; gap: 10px; }
        .header-title i { color: #ff007f; font-size: 20px; }
        .header h1 { font-size: 18px; font-weight: 600; }
        .header-icons i { margin-left: 15px; color: #b3b3b3; cursor: pointer; font-size: 18px; }
        .content-area { flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 80px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        /* Video Card */
        .video-card { background-color: #1c1c24; border-radius: 12px; overflow: hidden; margin-bottom: 20px; border: 1px solid #2a2a35; }
        .thumbnail-container { position: relative; width: 100%; height: 220px; background-color: #000; display: flex; justify-content: center; align-items: center; }
        .thumbnail-img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            /* filter: blur(6px); কে আমরা বাদ দিয়ে দিলাম */
        }

        .lock-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.3); display: flex; justify-content: center; align-items: center; cursor: pointer; z-index: 1; }
        .lock-circle { background: rgba(255, 0, 127, 0.9); width: 55px; height: 55px; border-radius: 50%; display: flex; justify-content: center; align-items: center; box-shadow: 0 0 15px rgba(255, 0, 127, 0.5); }
        .lock-circle i { color: white; font-size: 20px; }
        .badge-new { position: absolute; top: 10px; left: 10px; background-color: #00cc66; color: white; padding: 3px 8px; font-size: 11px; font-weight: bold; border-radius: 4px; z-index: 2; }
        .real-video { width: 100%; height: 100%; display: none; object-fit: contain; }
        .video-info { padding: 12px; }
        .video-title { font-size: 15px; font-weight: bold; margin-bottom: 6px; line-height: 1.4; }
        .video-stats { font-size: 12px; color: #a0a0a0; margin-bottom: 12px; }
        .video-stats span { color: #ff007f; margin-left: 8px; }
        .action-container { display: flex; gap: 10px; }
        .btn-unlock { flex: 1; background: linear-gradient(90deg, #ff007f, #cc0066); color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; font-size: 14px; cursor: pointer; text-transform: uppercase; }
        .btn-link { background-color: #2d2d3d; color: white; border: none; width: 44px; border-radius: 8px; cursor: pointer; display: flex; justify-content: center; align-items: center; font-size: 16px; }

        /* Navigation & Profile */
        .profile-card { background: linear-gradient(180deg, #ff007f 0%, #1c1c24 60%); border-radius: 16px; padding: 25px 15px; text-align: center; border: 1px solid #2a2a35; }
        .profile-avatar { width: 80px; height: 80px; border-radius: 50%; border: 3px solid white; margin: 0 auto 15px; display: flex; justify-content: center; align-items: center; font-size: 32px; background: #333; }
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; background-color: #121218; padding: 15px 10px; border-radius: 10px; margin-top: 15px; }
        .stat-num { font-size: 18px; font-weight: bold; color: #ff007f; }
        .stat-label { font-size: 11px; color: #a0a0a0; }
        .bottom-nav { position: absolute; bottom: 0; left: 0; width: 100%; height: 65px; background-color: #16161a; border-top: 1px solid #1f1f1f; display: flex; justify-content: space-around; align-items: center; z-index: 10; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #8e8e93; font-size: 11px; cursor: pointer; background: none; border: none; width: 20%; }
        .nav-item i { font-size: 20px; margin-bottom: 4px; }
        .nav-item.active { color: #ff007f; }
    </style>
</head>
<body>

<div class="phone-container">
    <div class="header">
        <div class="header-title"><i class="fa-solid fa-circle-play"></i><h1>Global Viral Video...</h1></div>
    </div>

    <div class="content-area">
        <div id="home" class="tab-content active"><div id="videoContainer"></div></div>
        
        <div id="favorites" class="tab-content">
            <div style="text-align: center; margin-top: 50px; color: #666;"><i class="fa-regular fa-heart" style="font-size: 50px; margin-bottom: 15px;"></i><p>এখনো কিছু পছন্দ করেননি</p></div>
        </div>

        <div id="tutorial" class="tab-content">
            <h3 style="margin-bottom: 15px;">কিভাবে আনলক করবেন</h3>
            <div style="background:#1c1c24; padding:15px; border-radius:10px; margin-bottom:12px;">৩টি বিজ্ঞাপন সম্পূর্ণ দেখলে ভিডিও স্বয়ংক্রিয়ভাবে প্লে হবে।</div>
        </div>

        <div id="profile" class="tab-content">
            <div class="profile-card">
                <div class="profile-avatar"><i class="fa-solid fa-user"></i></div>
                <div class="profile-name">Parvez Khan 🤟</div>
                <div class="stats-grid">
                    <div class="stat-box"><div class="stat-num">0</div><div class="stat-label">Liked</div></div>
                    <div class="stat-box"><div class="stat-num" id="todayAdsCount">0</div><div class="stat-label">Today Ads</div></div>
                    <div class="stat-box"><div class="stat-num">20</div><div class="stat-label">Daily Limit</div></div>
                </div>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <button class="nav-item active" onclick="switchTab('home', this)"><i class="fa-solid fa-house"></i><span>হোম</span></button>
        <button class="nav-item" onclick="switchTab('favorites', this)"><i class="fa-solid fa-heart"></i><span>পছন্দের</span></button>
        <button class="nav-item" onclick="switchTab('tutorial', this)"><i class="fa-solid fa-circle-info"></i><span>টিউটোরিয়াল</span></button>
        <button class="nav-item" onclick="switchTab('profile', this)"><i class="fa-solid fa-user"></i><span>প্রোফাইল</span></button>
    </div>
</div>

<script>
    // লোকালস্টোরেজ থেকে ডাটা রিড করা
    let videos = JSON.parse(localStorage.getItem('admin_videos')) || [];
    let monetagLink = localStorage.getItem('monetag_link') || "";
    let customScript = localStorage.getItem('custom_ad_script') || "";

    // অ্যাড স্ক্রিপ্ট ইনজেক্ট করা (যদি অ্যাডমিন প্যানেল থেকে দেওয়া থাকে)
    if(customScript) {
        document.getElementById('dynamicAdScripts').innerHTML = customScript;
    }

    let userProgress = {};
    let totalClicksToday = parseInt(localStorage.getItem('today_ads')) || 0;
    document.getElementById('todayAdsCount').innerText = totalClicksToday;

    function renderVideos() {
        const container = document.getElementById('videoContainer');
        container.innerHTML = videos.length === 0 ? '<p style="text-align:center;color:#666;margin-top:20px;">কোনো ভিডিও নেই। অ্যাডমিন প্যানেল থেকে যোগ করুন।</p>' : '';
        
        videos.forEach(video => {
            userProgress[video.id] = 0;
            container.innerHTML += `
                <div class="video-card">
                    <div class="thumbnail-container">
                        <span class="badge-new">NEW</span>
                        <div id="lock-${video.id}" class="lock-overlay" onclick="watchAd(${video.id}, '${video.videoUrl}')">
                            <img class="thumbnail-img" src="${video.thumbnail}">
                            <div class="lock-circle"><i class="fa-solid fa-lock"></i></div>
                        </div>
                    </div>
                    <div class="video-info">
                        <div class="video-title">${video.title}</div>
                        <div class="video-stats">VIEWS: ${video.views} <span><i class="fa-solid fa-heart"></i> ${video.likes}</span></div>
                        <div class="action-container">
                            <button class="btn-unlock" id="btn-${video.id}" onclick="watchAd(${video.id}, '${video.videoUrl}')">UNLOCK — 0/3 ADS</button>
                        </div>
                    </div>
                </div>`;
        });
    }

    function watchAd(id, targetUrl) {
        if (userProgress[id] < 3) {
            userProgress[id]++;
            totalClicksToday++;
            localStorage.setItem('today_ads', totalClicksToday);
            document.getElementById('todayAdsCount').innerText = totalClicksToday;
            document.getElementById(`btn-${id}`).innerText = `UNLOCK — ${userProgress[id]}/3 ADS`;

            // মোনেটাগ ডিরেক্ট লিংক হ্যান্ডেল করার আপগ্রেডেড সেফ কোড
            if (monetagLink) {
                try {
                    if (monetagLink.startsWith('intent://')) {
                        let fallbackUrl = monetagLink.replace('intent://', 'https://');
                        window.location.href = fallbackUrl; 
                    } else {
                        window.open(monetagLink, '_blank');
                    }
                } catch (e) {
                    window.location.href = monetagLink;
                }
            } else {
                alert(`বিজ্ঞাপন ${userProgress[id]} লোড হচ্ছে...`);
            }

            // ৩টি অ্যাড দেখা সম্পন্ন হলে ইউজারকে সরাসরি সেট করা লিংকে রিডাইরেক্ট করবে
            if (userProgress[id] === 3) {
                document.getElementById(`btn-${id}`).innerText = "REDIRECTING...";
                document.getElementById(`btn-${id}`).style.background = "linear-gradient(90deg, #00cc66, #00994d)";
                
                // কাস্টম ওয়েবসাইট/লিংকটি নতুন ট্যাবে ওপেন করবে
                window.open(targetUrl, '_blank');
            }
        }
    }

    function switchTab(tabId, element) {
        document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        element.classList.add('active');
    }

    renderVideos();
</script>
</body>
</html>
