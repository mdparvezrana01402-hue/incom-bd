<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Ads Control</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f6f9; padding: 20px; color: #333; }
        .container { max-width: 650px; margin: 0 auto; background: #fff; padding: 20px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h2, h3 { color: #ff007f; text-align: center; margin-bottom: 15px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; color: #555; }
        input, textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        textarea { height: 100px; font-family: monospace; }
        button { background: #ff007f; color: white; border: none; padding: 12px 20px; width: 100%; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 5px; }
        button:hover { background: #e0006c; }
        .list-item { background: #f9f9f9; padding: 10px; border: 1px solid #eee; margin-top: 5px; border-radius: 5px; display: flex; justify-content: space-between; align-items: center; }
        .btn-danger { background: red; width: auto; padding: 5px 10px; font-size: 12px; margin: 0; }
        .section-box { border: 1px solid #ff007f; padding: 15px; border-radius: 8px; margin-bottom: 25px; background-color: #fff9fb; }
    </style>
</head>
<body>

<div class="container">
    <h2>Admin Dashboard (Control Panel)</h2>
    <hr style="margin-bottom:20px; border:1px solid #eee;">

    <!-- বিজ্ঞাপনের জন্য বিশেষ সেকশন -->
    <div class="section-box">
        <h3>💰 Ad Network Settings</h3>
        
        <div class="form-group">
            <label>Monetag Direct Link (স্মার্ট লিংক):</label>
            <input type="text" id="monetagLink" placeholder="https://aloudtaunt.com/xxxxxx/xxxxxx">
        </div>

        <div class="form-group">
            <label>Adobe Acrobat / Other Script Code (সম্পূর্ণ স্ক্রিপ্ট ট্যাগসহ):</label>
            <textarea id="customAdScript" placeholder="<script src='https://example.com/ad.js'></script> অথবা পপ-আন্ডার কোড"></textarea>
        </div>
        <button style="background: #00cc66;" onclick="saveAdSettings()">বিজ্ঞাপন সেটিং সেভ করুন</button>
    </div>

    <!-- নতুন ভিডিও যুক্ত করার ফর্ম -->
    <div class="section-box" style="border-color: #0088cc; background-color: #f9fbfd;">
        <h3 style="color: #0088cc;">🎬 নতুন ভিডিও আপলোড</h3>
        <div class="form-group">
            <label>ভিডিওর নাম (Title):</label>
            <input type="text" id="vTitle" placeholder="১৪ মিনিটের ভাইরাল ভিডিও...">
        </div>
        <div class="form-group">
            <label>থাম্বনেইল ইমেজ লিংক (Image URL):</label>
            <input type="text" id="vThumb" placeholder="https://images.com/photo.jpg">
        </div>
        <div class="form-group">
            <label>আসল ভিডিও লিংক (MP4 Video URL):</label>
            <input type="text" id="vUrl" placeholder="https://server.com/video.mp4">
        </div>
        <button style="background: #0088cc;" onclick="addVideo()">ভিডিও সেভ করুন</button>
    </div>

    <h3>বিদ্যমান ভিডিওর তালিকা</h3>
    <div id="adminVideoList"></div>
</div>

<script>
    let videos = JSON.parse(localStorage.getItem('admin_videos')) || [];

    // আগের জমানো বিজ্ঞাপনের ডাটা লোড করা
    document.getElementById('monetagLink').value = localStorage.getItem('monetag_link') || '';
    document.getElementById('customAdScript').value = localStorage.getItem('custom_ad_script') || '';

    function saveAdSettings() {
        const monetag = document.getElementById('monetagLink').value;
        const script = document.getElementById('customAdScript').value;
        
        localStorage.setItem('monetag_link', monetag);
        localStorage.setItem('custom_ad_script', script);
        
        alert("বিজ্ঞাপন সফলভাবে আপডেট করা হয়েছে! মূল অ্যাপে এটি কাজ করা শুরু করবে।");
    }

    function displayVideos() {
        const list = document.getElementById('adminVideoList');
        list.innerHTML = '';
        videos.forEach((v, index) => {
            list.innerHTML += `
                <div class="list-item">
                    <span>${v.title}</span>
                    <button class="btn-danger" onclick="deleteVideo(${index})">ডিলিট</button>
                </div>`;
        });
    }

    function addVideo() {
        const title = document.getElementById('vTitle').value;
        const thumbnail = document.getElementById('vThumb').value;
        const videoUrl = document.getElementById('vUrl').value;

        if(!title || !thumbnail || !videoUrl) return alert("সব তথ্য পূরণ করুন!");

        const newVideo = {
            id: Date.now(),
            title: title,
            thumbnail: thumbnail,
            videoUrl: videoUrl,
            views: Math.floor(Math.random() * 5000) + 500,
            likes: Math.floor(Math.random() * 500) + 10
        };

        videos.push(newVideo);
        localStorage.setItem('admin_videos', JSON.stringify(videos));
        alert("ভিডিও সফলভাবে যুক্ত হয়েছে!");
        
        document.getElementById('vTitle').value = '';
        document.getElementById('vThumb').value = '';
        document.getElementById('vUrl').value = '';
        displayVideos();
    }

    function deleteVideo(index) {
        if(confirm("ভিডিওটি ডিলিট করতে চান?")) {
            videos.splice(index, 1);
            localStorage.setItem('admin_videos', JSON.stringify(videos));
            displayVideos();
        }
    }

    displayVideos();
</script>
</body>
</html>
